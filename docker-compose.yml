services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: velq
      POSTGRES_PASSWORD: velq
      POSTGRES_DB: velq
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velq -d velq"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://velq:velq@db:5432/velq
      PORT: "3100"
      SERVE_UI: "true"
      VELQ_DEPLOYMENT_MODE: "authenticated"
      VELQ_DEPLOYMENT_EXPOSURE: "private"
      VELQ_PUBLIC_URL: "${VELQ_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - velq-data:/velq
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  velq-data:
